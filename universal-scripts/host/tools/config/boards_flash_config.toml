####################################
# RZ/V2H EVK board configurations
####################################

[rzv2h-evk]
ethernet = ["15c30000", "15c40000"]
bl2_dest  = "0x08103000"
bl2_base = "0x8103000"
fconf_dtb_base = "0x08130000"

# Uload bootloader
flash_address = ["00000", "60000", "120000"]
load_address = "0x48000000"

# Bootloader flash SPI
[rzv2h-evk.xspi]
BL2 = ["8101E00", "00000"]
FIP = ["00000", "60000"]
BID = ["00810", "120000"]

# Bootloader flash eMMC
[rzv2h-evk.emmc]
BL2 = ["1", "1", "8101E00"]
FIP = ["1", "100", "00000", "2", "8"]
BID = ["1", "200", "120000", "762", "762"]
